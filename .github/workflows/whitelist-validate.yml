name: Validate Whitelist Request

on:
  issues:
    types: [opened, edited]

jobs:
  validate:
    if: contains(github.event.issue.labels.*.name, 'whitelist-request')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate whitelist request
        uses: actions/github-script@v8
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const labels = issue.labels.map(l => l.name);
            const isIP = labels.includes('ip-whitelist');
            const isDomain = labels.includes('domain-whitelist');
            const isNetworkRange = labels.includes('network-range');

            // Network range requests skip automated validation — maintainer-only review
            if (isNetworkRange) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `## :mag: Network Range Request Received\n\nThis request is for a **network range / bulk IP whitelist** and requires manual maintainer review.\n\nA maintainer will verify the source URL and decide whether to add this provider to the CDN whitelist pipeline.\n\n---\n*No automated processing — network ranges are reviewed manually for security.*`
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['validated']
              });
              return;
            }

            let entry = '';
            let entries = [];
            let errors = [];
            let warnings = [];
            let dnsEvidence = [];
            let sharedPlatformDetected = false;
            let cnameProviderDetected = false;

            // Parse the entry from the issue form body
            if (isIP) {
              const match = body.match(/###\s*IP Address\s*\n+([\s\S]*?)(?=\n###\s|$)/i);
              entry = match ? match[1].trim() : '';
            } else if (isDomain) {
              const match = body.match(/###\s*Domain(?:\(s\))?\s*\n+([\s\S]*?)(?=\n###\s|$)/i);
              const rawDomains = match ? match[1].trim() : '';
              entries = rawDomains
                .split(/\r?\n/)
                .map(d => d.trim())
                .filter(Boolean);
              entry = entries.join(', ');
            }

            if ((isIP && !entry) || (isDomain && entries.length === 0)) {
              errors.push('Could not parse the entry from the issue body. Please ensure the form was filled out correctly.');
            }

            // ── IP VALIDATION ──
            if (entry && isIP) {
              const { execSync } = require('child_process');

              // Reject CIDR notation — only single IPs allowed via this template
              if (entry.includes('/')) {
                errors.push(`CIDR ranges are not accepted in single IP requests: \`${entry}\`.\n\n  **Need to whitelist a network range?** Use the [Network Range Request](https://github.com/spydisec/spydithreatintel/issues/new?template=whitelist-network-range-request.yml) template instead — provide the provider's official IP list URL.`);
              } else {
                // Validate as a single IP address using Python ipaddress module
                try {
                  const result = execSync(`python3 -c "
            import ipaddress, json, sys
            try:
                addr = ipaddress.ip_address('${entry.replace(/'/g, '')}')
                info = {
                    'valid': True,
                    'is_private': addr.is_private,
                    'is_reserved': addr.is_reserved,
                    'is_loopback': addr.is_loopback,
                    'is_multicast': addr.is_multicast,
                    'is_link_local': addr.is_link_local,
                    'is_unspecified': addr.is_unspecified,
                    'version': addr.version
                }
                print(json.dumps(info))
            except ValueError as e:
                print(json.dumps({'valid': False, 'error': str(e)}))
            "`, { encoding: 'utf-8' });

                  const info = JSON.parse(result.trim());

                  if (!info.valid) {
                    errors.push(`Invalid IP address: \`${entry}\`. Expected a valid IPv4 or IPv6 address (e.g., \`1.1.1.1\` or \`2606:4700::1111\`).`);
                  } else {
                    if (info.is_private) {
                      errors.push(`Private IP address rejected: \`${entry}\`. Private/RFC1918 addresses (10.x, 172.16-31.x, 192.168.x) should not appear in public blocklists.`);
                    }
                    if (info.is_reserved || info.is_unspecified) {
                      errors.push(`Reserved/unspecified IP rejected: \`${entry}\`. This address is not routable on the public internet.`);
                    }
                    if (info.is_loopback) {
                      errors.push(`Loopback address rejected: \`${entry}\`. Localhost addresses cannot be whitelisted.`);
                    }
                    if (info.is_multicast) {
                      errors.push(`Multicast address rejected: \`${entry}\`. Multicast ranges are not applicable to threat blocklists.`);
                    }
                    if (info.is_link_local) {
                      errors.push(`Link-local address rejected: \`${entry}\`. Link-local addresses are not routable.`);
                    }
                  }
                } catch (e) {
                  errors.push(`Invalid IP address: \`${entry}\`. Could not parse as IPv4 or IPv6.`);
                }
              }
            }

            // ── DOMAIN VALIDATION ──
            if (entries.length > 0 && isDomain) {
              const dns = require('dns').promises;
              const cleanedEntries = [];

              // Reject exact platform suffixes; warn on specific subdomains hosted there.
              const sharedPlatformSuffixes = [
                'github.io', 'githubusercontent.com', 'github.com',
                'herokuapp.com', 'herokussl.com',
                'workers.dev', 'pages.dev',
                'netlify.app', 'netlify.com',
                'vercel.app',
                'azurewebsites.net', 'cloudapp.net', 'azure-api.net',
                'firebaseapp.com', 'web.app',
                'appspot.com',
                'blogspot.com', 'blogspot.co.uk',
                's3.amazonaws.com', 'cloudfront.net', 'elasticbeanstalk.com',
                'execute-api.amazonaws.com', 'amplifyapp.com',
                'pythonanywhere.com',
                'repl.co', 'replit.dev',
                'glitch.me',
                'ngrok.io', 'ngrok-free.app',
                'trycloudflare.com',
                'duckdns.org', 'no-ip.com', 'ddns.net', 'dynu.com'
              ];

              const providerFingerprints = [
                { suffix: 'sendgrid.net', provider: 'SendGrid' },
                { suffix: 'mailgun.org', provider: 'Mailgun' },
                { suffix: 'amazonses.com', provider: 'Amazon SES' },
                { suffix: 'sparkpostmail.com', provider: 'SparkPost' },
                { suffix: 'mandrillapp.com', provider: 'Mandrill' },
                { suffix: 'googlehosted.com', provider: 'Google Hosted Services' },
                { suffix: 'zendesk.com', provider: 'Zendesk' }
              ];

              const inferProvider = (hostname) => {
                if (!hostname) return null;
                const normalized = hostname.toLowerCase();
                const hit = providerFingerprints.find(p => normalized === p.suffix || normalized.endsWith('.' + p.suffix));
                return hit ? hit.provider : null;
              };

              const resolveCnameChain = async (domain, maxDepth = 6) => {
                const chain = [];
                const visited = new Set();
                let current = domain;

                for (let depth = 0; depth < maxDepth; depth++) {
                  if (visited.has(current)) {
                    break;
                  }
                  visited.add(current);

                  try {
                    const records = await dns.resolveCname(current);
                    if (!records || records.length === 0) {
                      break;
                    }

                    const next = String(records[0]).toLowerCase().replace(/\.$/, '');
                    chain.push({ from: current, to: next });
                    current = next;
                  } catch (err) {
                    // No CNAME or lookup failure; keep validation non-blocking.
                    break;
                  }
                }

                return {
                  chain,
                  finalTarget: chain.length > 0 ? chain[chain.length - 1].to : null
                };
              };

              for (const rawEntry of entries) {
                // Strip protocol, www, port, path
                const cleaned = rawEntry.replace(/^(https?:\/\/)?(www\.)?/, '').replace(/:[0-9]+$/, '').replace(/\/.*$/, '').toLowerCase().trim();

                // Reject wildcard patterns
                if (cleaned.includes('*')) {
                  errors.push(`Wildcard domains are not accepted: \`${rawEntry}\`. Submit a specific domain like \`example.com\` instead of \`*.example.com\`.`);
                  continue;
                }

                // Reject bare TLDs
                if (!cleaned.includes('.') || cleaned.startsWith('.')) {
                  errors.push(`Bare TLDs are not accepted: \`${rawEntry}\`. Submit a full domain like \`example.com\`, not \`.com\`.`);
                  continue;
                }

                // Basic format validation
                const domainRegex = /^([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}$/;
                if (!domainRegex.test(cleaned)) {
                  errors.push(`Invalid domain format: \`${rawEntry}\`. Expected a plain domain like \`example.com\` (no protocol, path, or special characters).`);
                  continue;
                }

                if (sharedPlatformSuffixes.some(ps => cleaned === ps || cleaned.endsWith('.' + ps))) {
                  // Check if the entry IS the public suffix itself (reject outright)
                  if (sharedPlatformSuffixes.includes(cleaned)) {
                    errors.push(`Shared hosting / public suffix domain rejected: \`${cleaned}\`. Whitelisting this would cover all sites hosted on the platform, including attacker infrastructure. Submit the specific subdomain instead (e.g., \`mysite.github.io\` not \`github.io\`).`);
                    continue;
                  }

                  // It's a specific subdomain on a shared platform — warn but allow
                  warnings.push(`\`${cleaned}\` is hosted on a shared platform. The maintainer will verify this specific subdomain is not used for malicious purposes.`);
                  sharedPlatformDetected = true;
                }

                cleanedEntries.push(cleaned);
              }

              entries = [...new Set(cleanedEntries)];
              entry = entries.join(', ');

              // DNS evidence collection (non-blocking): CNAME chain + provider hints.
              if (entries.length > 0 && errors.length === 0) {
                for (const domain of entries) {
                  const cnameInfo = await resolveCnameChain(domain);
                  const chainTargets = cnameInfo.chain.map(c => c.to);
                  const provider = inferProvider(cnameInfo.finalTarget) || chainTargets.map(inferProvider).find(Boolean) || null;

                  if (cnameInfo.chain.length > 0) {
                    const chainText = cnameInfo.chain.map(c => `${c.from} -> ${c.to}`).join(' -> ');
                    dnsEvidence.push(`\`${domain}\`: CNAME chain detected (${chainText})`);

                    if (provider) {
                      warnings.push(`\`${domain}\` resolves via CNAME to provider infrastructure (\`${provider}\`). Verify this tenant-specific hostname is legitimate before approval.`);
                      cnameProviderDetected = true;
                    }
                  } else {
                    dnsEvidence.push(`\`${domain}\`: no CNAME chain detected`);
                  }
                }
              }
            }

            // ── DUPLICATE CHECK ──
            if (((isIP && entry) || (isDomain && entries.length > 0)) && errors.length === 0) {
              const fs = require('fs');
              const path = require('path');

              const checkFiles = isIP
                ? [
                    'whitelist/wl_iplist/cdnips.txt',
                    'whitelist/wl_iplist/forcedwhitelistips.txt',
                    'whitelist/wl_iplist/community_whitelist_ips.txt'
                  ]
                : [
                    'whitelist/wl_domainlist/osintwhitelisteddomains.txt',
                    'whitelist/wl_domainlist/mypiholewhitelisteddomains.txt',
                    'whitelist/wl_domainlist/community_whitelist_domains.txt',
                    'whitelist/wl_domainlist/publicwhitelisted.txt'
                  ];

              const itemsToCheck = isIP ? [entry] : entries;

              for (const file of checkFiles) {
                const fullPath = path.join(process.env.GITHUB_WORKSPACE, file);
                if (fs.existsSync(fullPath)) {
                  const content = fs.readFileSync(fullPath, 'utf-8');
                  const lines = content.split('\n').map(l => l.split('#')[0].trim().toLowerCase());
                  for (const item of itemsToCheck) {
                    if (lines.includes(item.toLowerCase())) {
                      warnings.push(`Entry \`${item}\` already exists in \`${file}\`.`);
                    }
                  }
                }
              }
            }

            // ── BUILD RESULT COMMENT ──
            let commentBody = '';
            const type = isIP ? 'IP' : 'Domain';

            if (errors.length > 0) {
              commentBody = `## :x: Validation Failed\n\n**Entry:** \`${entry || '(not found)'}\`\n**Type:** ${type} Whitelist\n\n### Errors\n${errors.map(e => `- ${e}`).join('\n')}\n\nPlease edit this issue to fix the errors above.`;

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['invalid-format']
              });
            } else {
              let body = `## :white_check_mark: Validation Passed\n\n**Entry:** \`${entry}\`\n**Type:** ${type} Whitelist\n**Status:** Awaiting maintainer review`;

              if (warnings.length > 0) {
                body += `\n\n### :warning: Warnings\n${warnings.map(w => `- ${w}`).join('\n')}`;
              }

              if (isDomain && dnsEvidence.length > 0) {
                body += `\n\n### :satellite: DNS Evidence\n${dnsEvidence.map(d => `- ${d}`).join('\n')}`;
              }

              body += `\n\n---\n*A maintainer will review this request. Once approved, the \`approved\` label will be added and the entry will be automatically processed.*`;
              commentBody = body;

              const labelsToAdd = ['validated'];
              if (isDomain && sharedPlatformDetected) {
                labelsToAdd.push('shared-platform-warning');
              }
              if (isDomain && cnameProviderDetected) {
                labelsToAdd.push('cname-provider-detected');
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labelsToAdd
              });

              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: 'invalid-format'
                });
              } catch (e) {
                // Label didn't exist, ignore
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: commentBody
            });
