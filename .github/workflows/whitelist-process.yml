name: Process Approved Whitelist Request

on:
  issues:
    types: [labeled]

jobs:
  process:
    if: >-
      github.event.label.name == 'approved' &&
      contains(github.event.issue.labels.*.name, 'whitelist-request')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Process whitelist entry
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');

            const issue = context.payload.issue;
            const body = issue.body || '';
            const labels = issue.labels.map(l => l.name);
            const isIP = labels.includes('ip-whitelist');
            const isDomain = labels.includes('domain-whitelist');
            const issueNumber = issue.number;
            const issueUser = issue.user.login;

            let entry = '';
            let entries = [];

            // Parse entry from issue form
            if (isIP) {
              const match = body.match(/###\s*IP Address\s*\n+([\s\S]*?)(?=\n###\s|$)/i);
              entry = match ? match[1].trim() : '';
              entries = entry ? [entry] : [];
            } else if (isDomain) {
              const match = body.match(/###\s*Domain(?:\(s\))?\s*\n+([\s\S]*?)(?=\n###\s|$)/i);
              const rawDomains = match ? match[1].trim() : '';
              entries = rawDomains
                .split(/\r?\n/)
                .map(d => d.trim())
                .filter(Boolean)
                .map(d => d.replace(/^(https?:\/\/)?(www\.)?/, '').replace(/:[0-9]+$/, '').replace(/\/.*$/, '').toLowerCase().trim());
              entries = [...new Set(entries)];
              entry = entries.join(', ');
            }

            if (entries.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: ':x: **Processing failed**: Could not parse the entry from the issue body.'
              });
              return;
            }

            // Parse reason from issue form
            let reason = 'Community whitelist request';
            const reasonMatch = body.match(/### Reason for Whitelisting\s*\n\s*\n\s*(.+)/);
            if (reasonMatch) {
              reason = reasonMatch[1].trim();
            }

            // Determine target file
            const targetFile = isIP
              ? 'whitelist/wl_iplist/community_whitelist_ips.txt'
              : 'whitelist/wl_domainlist/community_whitelist_domains.txt';
            const fullPath = path.join(process.env.GITHUB_WORKSPACE, targetFile);

            // Check for duplicates before appending
            const existingContent = fs.readFileSync(fullPath, 'utf-8');
            const existingLines = existingContent.split('\n').map(l => l.split('#')[0].trim().toLowerCase());
            const newEntries = entries.filter(e => !existingLines.includes(e.toLowerCase()));

            if (newEntries.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `:warning: **Already whitelisted**: all submitted entries are already present in \`${targetFile}\`. Closing issue.`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'closed',
                state_reason: 'not_planned'
              });
              return;
            }

            // Append entry/entries to the community whitelist file
            const newLines = newEntries
              .map(e => `${e} # Issue #${issueNumber}: ${reason} (by @${issueUser})`)
              .join('\n') + '\n';
            fs.appendFileSync(fullPath, newLines);

            // Configure git and commit
            const type = isIP ? 'IP' : 'Domain';
            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "41898282+github-actions[bot]@users.noreply.github.com"');
            execSync(`git add "${targetFile}"`);
            const commitSummary = newEntries.length === 1 ? newEntries[0] : `${newEntries.length} entries`;
            execSync(`git commit -m "Whitelist: Add ${type} ${commitSummary} (Issue #${issueNumber})"`);
            execSync('git push origin main');

            // Close issue with confirmation
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `:white_check_mark: **Whitelist updated!**\n\n**Entry:** \`${newEntries.join(', ')}\`\n**Type:** ${type} Whitelist\n**File:** \`${targetFile}\`\n**Commit:** Pushed to \`main\`\n\nThis entry will take effect on the next pipeline run. Thank you for your contribution!`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed',
              state_reason: 'completed'
            });
