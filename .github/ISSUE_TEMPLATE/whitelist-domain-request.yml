name: "Whitelist Request: Domain"
description: Request one or more domains to be added to the community whitelist
title: "[Domain Whitelist] "
labels: ["whitelist-request", "domain-whitelist"]
body:
  - type: markdown
    attributes:
      value: |
        ## Domain Whitelist Request
        Use this form to request adding one or more domains/subdomains to the community whitelist.
        All requests are reviewed by a maintainer before being applied.

        **Accepted:** `example.com`, `cdn.example.com`, `api.service.io`
        **Not accepted:** wildcards (`*.example.com`), bare TLDs (`.com`), shared hosting platforms (`github.io`, `herokuapp.com`)
        **Format:** one domain/subdomain per line (no protocols, paths, or commas)

  - type: textarea
    id: domains
    attributes:
      label: Domain(s)
      description: "Enter one domain/subdomain per line (e.g., example.com or api.example.com). No wildcards, bare TLDs, protocols, or paths."
      placeholder: |
        example.com
        cdn.example.com
        api.service.io
    validations:
      required: true

  - type: dropdown
    id: reason
    attributes:
      label: Reason for Whitelisting
      description: Why should these domain(s) be whitelisted?
      options:
        - False Positive (legitimate site incorrectly blocked)
        - Legitimate Service / SaaS Provider
        - CDN / Content Delivery
        - Authentication / SSO Provider
        - Other (explain below)
    validations:
      required: true

  - type: textarea
    id: justification
    attributes:
      label: Justification
      description: Provide details on why these domain(s) are false positives or should be whitelisted
      placeholder: "These domains belong to a legitimate SaaS provider and are incorrectly classified as malicious..."
    validations:
      required: true

  - type: input
    id: evidence_url
    attributes:
      label: Evidence URL (optional)
      description: "Link to the domain's official page, VirusTotal scan, or other evidence"
      placeholder: "https://www.virustotal.com/gui/domain/example.com"
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I have verified this domain is not associated with malicious activity
          required: true
        - label: I understand each submitted domain/subdomain will be reviewed individually
          required: true
        - label: I understand this request will be reviewed before approval
          required: true
